<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1000">
  <defs>
    <!-- Star: outer R=26, inner r=10, correct 5-pointed star geometry -->
    <polygon id="s" points="0,-26 5.88,-8.09 24.73,-8.03 9.51,3.09 15.29,21.03 0,10 -15.29,21.03 -9.51,3.09 -24.73,-8.03 -5.88,-8.09" fill="#fff"/>
  </defs>

  <!-- 13 stripes: 7 red, 6 white -->
  <rect width="1900" height="1000" fill="#B22234"/>
  <rect y="76.9"  width="1900" height="76.9" fill="#fff"/>
  <rect y="230.8" width="1900" height="76.9" fill="#fff"/>
  <rect y="384.6" width="1900" height="76.9" fill="#fff"/>
  <rect y="538.5" width="1900" height="76.9" fill="#fff"/>
  <rect y="692.3" width="1900" height="76.9" fill="#fff"/>
  <rect y="846.2" width="1900" height="76.9" fill="#fff"/>

  <!-- Blue canton: 40% width × 7/13 height -->
  <rect width="760" height="538.5" fill="#3C3B6E"/>

  <!-- 50 stars: 9 rows · odd rows = 6 stars · even rows = 5 stars
       Row spacing  = 538.5/10 = 53.85  → y: 54,108,162,216,270,324,378,432,486
       Col spacing  = 110px
       6-star rows  start x=55  → 55,165,275,385,495,605
       5-star rows  start x=110 → 110,220,330,440,550                          -->
  <!-- Row 1 -->
  <use href="#s" x="55"  y="54"/><use href="#s" x="165" y="54"/><use href="#s" x="275" y="54"/><use href="#s" x="385" y="54"/><use href="#s" x="495" y="54"/><use href="#s" x="605" y="54"/>
  <!-- Row 2 -->
  <use href="#s" x="110" y="108"/><use href="#s" x="220" y="108"/><use href="#s" x="330" y="108"/><use href="#s" x="440" y="108"/><use href="#s" x="550" y="108"/>
  <!-- Row 3 -->
  <use href="#s" x="55"  y="162"/><use href="#s" x="165" y="162"/><use href="#s" x="275" y="162"/><use href="#s" x="385" y="162"/><use href="#s" x="495" y="162"/><use href="#s" x="605" y="162"/>
  <!-- Row 4 -->
  <use href="#s" x="110" y="216"/><use href="#s" x="220" y="216"/><use href="#s" x="330" y="216"/><use href="#s" x="440" y="216"/><use href="#s" x="550" y="216"/>
  <!-- Row 5 -->
  <use href="#s" x="55"  y="270"/><use href="#s" x="165" y="270"/><use href="#s" x="275" y="270"/><use href="#s" x="385" y="270"/><use href="#s" x="495" y="270"/><use href="#s" x="605" y="270"/>
  <!-- Row 6 -->
  <use href="#s" x="110" y="324"/><use href="#s" x="220" y="324"/><use href="#s" x="330" y="324"/><use href="#s" x="440" y="324"/><use href="#s" x="550" y="324"/>
  <!-- Row 7 -->
  <use href="#s" x="55"  y="378"/><use href="#s" x="165" y="378"/><use href="#s" x="275" y="378"/><use href="#s" x="385" y="378"/><use href="#s" x="495" y="378"/><use href="#s" x="605" y="378"/>
  <!-- Row 8 -->
  <use href="#s" x="110" y="432"/><use href="#s" x="220" y="432"/><use href="#s" x="330" y="432"/><use href="#s" x="440" y="432"/><use href="#s" x="550" y="432"/>
  <!-- Row 9 -->
